name: PR Verify

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  packages: read

jobs:
  verify:
    name: PR Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.13

      - name: Validate packages token
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          if [ -z "$GH_PACKAGES_TOKEN" ]; then
            echo "Missing repository secret GH_PACKAGES_TOKEN (PAT with read:packages)."
            exit 1
          fi

      - name: Configure npm auth for GitHub Packages
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          printf $'[install.scopes]\n"@rchapkailo" = { token = "%s", url = "https://npm.pkg.github.com/" }\n' "${GH_PACKAGES_TOKEN}" > "$HOME/.bunfig.toml"
          cat "$HOME/.bunfig.toml"

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
