name: Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      parent_commit_sha:
        description: Parent commit SHA used by child cut-release (defaults to this workflow commit SHA)
        required: false
        default: ""
        type: string
      parent_repo:
        description: Parent repository in owner/name format
        required: false
        default: rchapkailo/parent
        type: string
      timeout_minutes:
        description: Timeout per child workflow run
        required: false
        default: "30"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  cut-release-children:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        child_repo:
          - rchapkailo/child-x
          - rchapkailo/child-y
          - rchapkailo/shared
    steps:
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Dispatch and wait for child cut-release
        env:
          TARGET_REPO: ${{ matrix.child_repo }}
          WORKFLOW_FILE: cut-release.yml
          PARENT_COMMIT_SHA: ${{ inputs.parent_commit_sha }}
          PARENT_REPO: ${{ inputs.parent_repo }}
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
          ORCHESTRATOR_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          node <<'NODE'
          const token = process.env.ORCHESTRATOR_TOKEN;
          if (!token) {
            throw new Error('Missing ORCHESTRATOR_TOKEN. Configure GH_PACKAGES_TOKEN with access to child repositories.');
          }

          const targetRepo = process.env.TARGET_REPO;
          const workflowFile = process.env.WORKFLOW_FILE;
          const parentSha = process.env.PARENT_COMMIT_SHA || process.env.CURRENT_SHA;
          const parentRepo = process.env.PARENT_REPO;
          const timeoutMinutes = Number(process.env.TIMEOUT_MINUTES || '30');
          const startedAt = Date.now();

          const api = async (path, method = 'GET', body) => {
            const res = await fetch(`https://api.github.com${path}`, {
              method,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json'
              },
              body: body ? JSON.stringify(body) : undefined
            });
            const text = await res.text();
            const json = text ? JSON.parse(text) : null;
            if (!res.ok) {
              throw new Error(`GitHub API ${method} ${path} failed (${res.status}): ${text}`);
            }
            return json;
          };

          await api(
            `/repos/${targetRepo}/actions/workflows/${workflowFile}/dispatches`,
            'POST',
            {
              ref: 'main',
              inputs: {
                parent_commit_sha: parentSha,
                parent_repo: parentRepo
              }
            }
          );

          let runId = null;
          while (!runId) {
            if (Date.now() - startedAt > timeoutMinutes * 60 * 1000) {
              throw new Error(`Timed out waiting for ${targetRepo} ${workflowFile} run to appear.`);
            }

            const runs = await api(
              `/repos/${targetRepo}/actions/workflows/${workflowFile}/runs?event=workflow_dispatch&branch=main&per_page=20`
            );
            const candidate = (runs.workflow_runs || []).find((r) => {
              const created = Date.parse(r.created_at);
              return Number.isFinite(created) && created >= startedAt - 90 * 1000;
            });

            if (candidate) {
              runId = candidate.id;
              break;
            }
            await new Promise((resolve) => setTimeout(resolve, 5000));
          }

          while (true) {
            if (Date.now() - startedAt > timeoutMinutes * 60 * 1000) {
              throw new Error(`Timed out waiting for ${targetRepo} ${workflowFile} run ${runId} to complete.`);
            }

            const run = await api(`/repos/${targetRepo}/actions/runs/${runId}`);
            if (run.status === 'completed') {
              if (run.conclusion !== 'success') {
                throw new Error(`${targetRepo} ${workflowFile} failed: ${run.html_url}`);
              }
              console.log(`Success: ${targetRepo} ${workflowFile} -> ${run.html_url}`);
              break;
            }
            await new Promise((resolve) => setTimeout(resolve, 10000));
          }
          NODE

  promote-stable-children:
    runs-on: ubuntu-latest
    needs: cut-release-children
    strategy:
      fail-fast: false
      matrix:
        child_repo:
          - rchapkailo/child-x
          - rchapkailo/child-y
          - rchapkailo/shared
    steps:
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Dispatch and wait for child promote-stable
        env:
          TARGET_REPO: ${{ matrix.child_repo }}
          WORKFLOW_FILE: promote-stable.yml
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
          ORCHESTRATOR_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const token = process.env.ORCHESTRATOR_TOKEN;
          if (!token) {
            throw new Error('Missing ORCHESTRATOR_TOKEN. Configure GH_PACKAGES_TOKEN with access to child repositories.');
          }

          const targetRepo = process.env.TARGET_REPO;
          const workflowFile = process.env.WORKFLOW_FILE;
          const timeoutMinutes = Number(process.env.TIMEOUT_MINUTES || '30');
          const startedAt = Date.now();

          const api = async (path, method = 'GET', body) => {
            const res = await fetch(`https://api.github.com${path}`, {
              method,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.github+json',
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json'
              },
              body: body ? JSON.stringify(body) : undefined
            });
            const text = await res.text();
            const json = text ? JSON.parse(text) : null;
            if (!res.ok) {
              throw new Error(`GitHub API ${method} ${path} failed (${res.status}): ${text}`);
            }
            return json;
          };

          await api(
            `/repos/${targetRepo}/actions/workflows/${workflowFile}/dispatches`,
            'POST',
            { ref: 'main', inputs: {} }
          );

          let runId = null;
          while (!runId) {
            if (Date.now() - startedAt > timeoutMinutes * 60 * 1000) {
              throw new Error(`Timed out waiting for ${targetRepo} ${workflowFile} run to appear.`);
            }

            const runs = await api(
              `/repos/${targetRepo}/actions/workflows/${workflowFile}/runs?event=workflow_dispatch&branch=main&per_page=20`
            );
            const candidate = (runs.workflow_runs || []).find((r) => {
              const created = Date.parse(r.created_at);
              return Number.isFinite(created) && created >= startedAt - 90 * 1000;
            });

            if (candidate) {
              runId = candidate.id;
              break;
            }
            await new Promise((resolve) => setTimeout(resolve, 5000));
          }

          while (true) {
            if (Date.now() - startedAt > timeoutMinutes * 60 * 1000) {
              throw new Error(`Timed out waiting for ${targetRepo} ${workflowFile} run ${runId} to complete.`);
            }

            const run = await api(`/repos/${targetRepo}/actions/runs/${runId}`);
            if (run.status === 'completed') {
              if (run.conclusion !== 'success') {
                throw new Error(`${targetRepo} ${workflowFile} failed: ${run.html_url}`);
              }
              console.log(`Success: ${targetRepo} ${workflowFile} -> ${run.html_url}`);
              break;
            }
            await new Promise((resolve) => setTimeout(resolve, 10000));
          }
          NODE

  bump-parent-to-stable:
    runs-on: ubuntu-latest
    needs: promote-stable-children
    steps:
      - name: Check out main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Resolve latest stable versions and pin dependencies
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const token = process.env.GH_TOKEN;
          if (!token) {
            throw new Error('Missing GH_TOKEN. Configure GH_PACKAGES_TOKEN for package metadata access.');
          }

          const packages = [
            '@rchapkailo/child-x',
            '@rchapkailo/child-y',
            '@rchapkailo/shared'
          ];

          const stablePattern = /^\d+\.\d+\.\d+$/;
          const resolveStable = async (name) => {
            const url = `https://npm.pkg.github.com/${encodeURIComponent(name)}`;
            const res = await fetch(url, {
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: 'application/vnd.npm.install-v1+json'
              }
            });
            if (!res.ok) {
              throw new Error(`Failed to fetch package metadata for ${name}: ${res.status}`);
            }
            const data = await res.json();
            const latest = data?.['dist-tags']?.latest;
            if (!latest || !stablePattern.test(latest)) {
              throw new Error(`Package ${name} has non-stable latest dist-tag: ${String(latest)}`);
            }
            return latest;
          };

          (async () => {
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.dependencies = pkg.dependencies || {};

            for (const name of packages) {
              const version = await resolveStable(name);
              pkg.dependencies[name] = version;
              console.log(`${name} -> ${version}`);
            }

            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');
          })().catch((err) => {
            console.error(err.message || err);
            process.exit(1);
          });
          NODE

      - name: Open PR to pin child stable versions
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GH_PACKAGES_TOKEN != '' && secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore: pin child repos to latest stable"
          branch: chore/pin-children-stable
          delete-branch: true
          title: "chore: pin child repos to latest stable"
          body: |
            ## Summary
            - Orchestrator completed child release pipeline.
            - Cut release branches in child-x, child-y, and shared.
            - Promoted stable versions in child-x, child-y, and shared.
            - Pinned parent dependencies to latest stable dist-tags.

            ## Validation
            - Child `cut-release` workflow: succeeded for all child repos.
            - Child `promote-stable` workflow: succeeded for all child repos.
            - Parent dependency update generated from registry `latest` stable tags.

            ## Execution Report
            - Agent name: GitHub Copilot
            - LLM model: Claude Sonnet 4.6
            - Actions performed: orchestrated child release workflows and opened this parent dependency bump PR.
          base: main
